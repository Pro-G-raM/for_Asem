<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Асем ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ffb3c6 100%);
            overflow: hidden;
            position: relative;
        }

        /* Анимация летающих сердечек на фоне */
        .heart-bg {
            position: absolute;
            font-size: 24px;
            color: rgba(255, 75, 110, 0.4);
            animation: float 6s linear infinite;
            user-select: none;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.8);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 75, 110, 0.15);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: all 0.5s ease;
        }

        h1 {
            color: #ff4b6e;
            font-size: 28px;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        p {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .gif-container {
            width: 100%;
            max-width: 200px;
            margin: 0 auto 20px auto;
        }

        .gif-container img {
            width: 100%;
            border-radius: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: relative;
            min-height: 60px;
        }

        .btn {
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            outline: none;
        }

        #yes-btn {
            background-color: #ff4b6e;
            color: white;
            box-shadow: 0 8px 20px rgba(255, 75, 110, 0.3);
        }

        #yes-btn:hover {
            transform: scale(1.05);
            background-color: #ff3357;
        }

        #no-btn {
            background-color: #f0f0f0;
            color: #666;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 11;
        }

        /* Экран победы (скрыт по умолчанию) */
        .hidden {
            display: none !important;
        }

        .success-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            animation: fadeIn 1s ease forwards;
        }

        .success-screen img {
            width: 100%;
            max-width: 320px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .success-screen h2 {
            color: #ff4b6e;
            font-size: 32px;
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Главная карточка с вопросом -->
    <div class="card" id="main-card">
        <div class="gif-container">
            <!-- Милый котик, который просит прощения -->
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbWdtYnd6Y3Z6bmt4bHpwd3Z5c2Zid214M3Nmdm1pN3p6eGdwY3lyZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbhswvKCc/giphy.gif" alt="Cute Cat">
        </div>
        <h1>Кешірші мені, Асем... 🥺</h1>
        <p>Я очень перед тобой виноват и безумно хочу всё исправить. Пожалуйста, давай забудем все обиды? Ты простишь меня?</p>
        
        <div class="buttons">
            <button class="btn" id="yes-btn">Да</button>
            <button class="btn" id="no-btn">Нет</button>
        </div>
    </div>

    <!-- Карточка, которая откроется при нажатии "Да" -->
    <div class="card hidden" id="success-card">
        <div class="success-screen">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcG5tdzh2M2J5dzI0OTI0amswNWFvYml2dmF5ZDVzNGtndTh2bjd0NiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/KztT2c4Y8mYYUiArYy/giphy.gif" alt="Happy Cat">
            <h2>Урааа! Спасибо! 🥰</h2>
            <p>Ты самая лучшая! Обещаю больше так не делать и только радовать тебя! ❤️</p>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mainCard = document.getElementById('main-card');
        const successCard = document.getElementById('success-card');

        // Функция случайного перемещения кнопки "Нет"
        function moveButton() {
            // Рассчитываем случайные координаты в пределах экрана, оставляя небольшие отступы
            const padding = 50;
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding * 2) + padding;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding * 2) + padding;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        // События для ПК (наведение мыши) и телефонов (тач)
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Предотвращаем стандартный клик при таче
            moveButton();
        });

        // Нажатие на "Да"
        yesBtn.addEventListener('click', () => {
            mainCard.classList.add('hidden');
            successCard.classList.remove('hidden');
            createHeartExplosion();
        });

        // Эффект взрыва сердечек при согласии
        function createHeartExplosion() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart-bg');
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.fontSize = Math.random() * 20 + 20 + 'px';
                    heart.style.animationDuration = Math.random() * 2 + 2 + 's';
                    document.body.appendChild(heart);
                    
                    // Удаляем сердечки после завершения анимации
                    setTimeout(() => heart.remove(), 4000);
                }, i * 100);
            }
        }

        // Создаем фоновые плывущие сердечки при загрузке
        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = ['❤️', '💖', '🌸', '✨'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 15 + 10 + 'px';
            heart.style.animationDuration = Math.random() * 4 + 4 + 's';
            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 7000);
        }, 800);
    </script>
</body>
</html>
